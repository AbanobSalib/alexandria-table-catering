<svg width="320" height="320" viewBox="0 0 320 320" xmlns="http://www.w3.org/2000/svg" role="img" aria-labelledby="logoTitle logoDesc">
  <title id="logoTitle">Sofret Mariane</title>
  <desc id="logoDesc">A gold-and-forest medallion with a serif M monogram, a serving dome, and crossed wheat sprigs.</desc>

  <defs>
    <linearGradient id="bgGrad" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%"  stop-color="#1c3128"/>
      <stop offset="55%" stop-color="#14241d"/>
      <stop offset="100%" stop-color="#0d1812"/>
    </linearGradient>
    <linearGradient id="goldGrad" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%"   stop-color="#f1d18a"/>
      <stop offset="50%"  stop-color="#e5bd79"/>
      <stop offset="100%" stop-color="#b88c3f"/>
    </linearGradient>
    <linearGradient id="goldHighlight" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%"   stop-color="#fff2c8"/>
      <stop offset="100%" stop-color="#e5bd79"/>
    </linearGradient>
    <radialGradient id="innerGlow" cx="0.5" cy="0.32" r="0.7">
      <stop offset="0%"   stop-color="#2b4538" stop-opacity="0.9"/>
      <stop offset="100%" stop-color="#14241d" stop-opacity="0"/>
    </radialGradient>
  </defs>

  <!-- Rounded card background -->
  <rect width="320" height="320" rx="76" fill="#fff8eb"/>
  <rect x="6" y="6" width="308" height="308" rx="72" fill="none" stroke="#e5bd79" stroke-opacity="0.32" stroke-width="1.2"/>

  <!-- Outer medallion -->
  <circle cx="160" cy="160" r="124" fill="url(#bgGrad)"/>
  <circle cx="160" cy="160" r="124" fill="url(#innerGlow)"/>

  <!-- Outer thin ring -->
  <circle cx="160" cy="160" r="118" fill="none" stroke="url(#goldGrad)" stroke-width="1.5" stroke-opacity="0.75"/>
  <!-- Inner braided ring with tick marks -->
  <g stroke="url(#goldGrad)" stroke-width="2.2" fill="none">
    <circle cx="160" cy="160" r="108"/>
  </g>
  <g fill="url(#goldGrad)">
    <!-- 4 cardinal diamonds -->
    <g>
      <polygon points="160,42 165,52 160,62 155,52" transform="translate(0,0)"/>
      <polygon points="160,42 165,52 160,62 155,52" transform="rotate(90 160 160)"/>
      <polygon points="160,42 165,52 160,62 155,52" transform="rotate(180 160 160)"/>
      <polygon points="160,42 165,52 160,62 155,52" transform="rotate(270 160 160)"/>
    </g>
    <!-- Tiny pearl dots around the ring -->
    <g opacity="0.85">
      <circle r="2" cx="160" cy="48"/>
      <circle r="2" cx="160" cy="272"/>
      <circle r="2" cx="48" cy="160"/>
      <circle r="2" cx="272" cy="160"/>
      <circle r="1.6" cx="237" cy="83"/>
      <circle r="1.6" cx="83" cy="83"/>
      <circle r="1.6" cx="237" cy="237"/>
      <circle r="1.6" cx="83" cy="237"/>
    </g>
  </g>

  <!-- Serving dome accent above the M -->
  <g transform="translate(160 100)">
    <path d="M-28 8 Q-28 -16 0 -16 Q28 -16 28 8 Z" fill="url(#goldHighlight)"/>
    <rect x="-32" y="8" width="64" height="4" rx="2" fill="url(#goldGrad)"/>
    <circle cx="0" cy="-18" r="3" fill="url(#goldGrad)"/>
  </g>

  <!-- Serif "M" monogram -->
  <g fill="url(#goldHighlight)">
    <path d="
      M104 220
      L104 130
      L98 130 L98 124
      L130 124
      L160 184
      L190 124
      L222 124 L222 130 L216 130
      L216 220 L222 220 L222 226 L186 226 L186 220 L194 220
      L194 142
      L160 210
      L156 210
      L122 142
      L122 220
      L130 220
      L130 226 L96 226 L96 220 Z
    "/>
  </g>

  <!-- Crossed wheat sprigs at bottom -->
  <g stroke="url(#goldGrad)" stroke-width="1.6" stroke-linecap="round" fill="url(#goldGrad)">
    <!-- left sprig -->
    <g transform="translate(112 246) rotate(-22)">
      <line x1="0" y1="0" x2="0" y2="-28"/>
      <ellipse cx="-4" cy="-6"  rx="2.2" ry="4.6" transform="rotate(-22 -4 -6)"/>
      <ellipse cx="4"  cy="-10" rx="2.2" ry="4.6" transform="rotate(22 4 -10)"/>
      <ellipse cx="-4" cy="-14" rx="2.2" ry="4.6" transform="rotate(-22 -4 -14)"/>
      <ellipse cx="4"  cy="-18" rx="2.2" ry="4.6" transform="rotate(22 4 -18)"/>
      <ellipse cx="-4" cy="-22" rx="2.2" ry="4.6" transform="rotate(-22 -4 -22)"/>
    </g>
    <!-- right sprig -->
    <g transform="translate(208 246) rotate(22)">
      <line x1="0" y1="0" x2="0" y2="-28"/>
      <ellipse cx="-4" cy="-6"  rx="2.2" ry="4.6" transform="rotate(-22 -4 -6)"/>
      <ellipse cx="4"  cy="-10" rx="2.2" ry="4.6" transform="rotate(22 4 -10)"/>
      <ellipse cx="-4" cy="-14" rx="2.2" ry="4.6" transform="rotate(-22 -4 -14)"/>
      <ellipse cx="4"  cy="-18" rx="2.2" ry="4.6" transform="rotate(22 4 -18)"/>
      <ellipse cx="-4" cy="-22" rx="2.2" ry="4.6" transform="rotate(-22 -4 -22)"/>
    </g>
    <!-- center tying knot -->
    <circle cx="160" cy="246" r="3" fill="url(#goldHighlight)" stroke="none"/>
  </g>
</svg>
