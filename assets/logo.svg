<svg width="320" height="320" viewBox="0 0 320 320" xmlns="http://www.w3.org/2000/svg" role="img" aria-labelledby="logoTitle logoDesc">
  <title id="logoTitle">Sofret Mariane</title>
  <desc id="logoDesc">Animated serif monogram on a gold-rimmed emerald medallion with rotating arabesque ring.</desc>

  <defs>
    <!-- emerald gradient base -->
    <radialGradient id="emerald" cx="50%" cy="40%" r="65%">
      <stop offset="0%"  stop-color="#234b3a"/>
      <stop offset="55%" stop-color="#15301f"/>
      <stop offset="100%" stop-color="#0a1c12"/>
    </radialGradient>
    <!-- gold gradient -->
    <linearGradient id="gold" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%"   stop-color="#fff0c6"/>
      <stop offset="40%"  stop-color="#f0c97a"/>
      <stop offset="70%"  stop-color="#d5a04a"/>
      <stop offset="100%" stop-color="#a17326"/>
    </linearGradient>
    <linearGradient id="goldShimmer" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%"   stop-color="#fff2c8" stop-opacity="0.95"/>
      <stop offset="50%"  stop-color="#f0c97a"/>
      <stop offset="100%" stop-color="#a17326"/>
    </linearGradient>
    <!-- soft glow around emblem -->
    <radialGradient id="innerGlow" cx="50%" cy="30%" r="55%">
      <stop offset="0%"  stop-color="#4a8769" stop-opacity="0.35"/>
      <stop offset="100%" stop-color="#0a1c12" stop-opacity="0"/>
    </radialGradient>

    <!-- arabesque flourish (used as inside ring decoration) -->
    <symbol id="leaflet" viewBox="-10 -4 20 8">
      <path d="M-9 0 q5 -6 9 0 q4 6 9 0" fill="none" stroke="url(#gold)" stroke-width="1.1" stroke-linecap="round"/>
    </symbol>

    <!-- subtle vignette mask -->
    <filter id="softShadow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="1.2"/>
    </filter>

    <style>
      .ring         { transform-origin: 160px 160px; animation: sm-spin 22s linear infinite; }
      .ring-rev     { transform-origin: 160px 160px; animation: sm-spin-rev 36s linear infinite; }
      .shimmer-fill { animation: sm-shimmer 6s ease-in-out infinite; }
      .pulse-dot    { transform-origin: 160px 100px; animation: sm-pulse 3.2s ease-in-out infinite; }
      .star         { transform-origin: 160px 160px; animation: sm-twinkle 4s ease-in-out infinite; }

      @keyframes sm-spin     { to   { transform: rotate(360deg); } }
      @keyframes sm-spin-rev { to   { transform: rotate(-360deg); } }
      @keyframes sm-shimmer {
        0%, 100% { opacity: 1; }
        50%      { opacity: 0.78; }
      }
      @keyframes sm-pulse {
        0%, 100% { transform: scale(1); opacity: 1; }
        50%      { transform: scale(1.18); opacity: 0.72; }
      }
      @keyframes sm-twinkle {
        0%, 100% { opacity: 0.6; }
        50%      { opacity: 1; }
      }

      @media (prefers-reduced-motion: reduce) {
        .ring, .ring-rev, .shimmer-fill, .pulse-dot, .star { animation: none !important; }
      }
    </style>
  </defs>

  <!-- rounded card background (cream) -->
  <rect width="320" height="320" rx="80" fill="#fff8eb"/>
  <rect x="6" y="6" width="308" height="308" rx="74" fill="none" stroke="#d5a04a" stroke-opacity="0.18"/>

  <!-- outer emerald medallion -->
  <circle cx="160" cy="160" r="128" fill="url(#emerald)"/>
  <circle cx="160" cy="160" r="128" fill="url(#innerGlow)" />

  <!-- decorative animated outer ring (counter-rotating) -->
  <g class="ring-rev">
    <circle cx="160" cy="160" r="118" fill="none" stroke="url(#gold)" stroke-width="0.8" stroke-dasharray="2 4" opacity="0.65"/>
  </g>

  <!-- inner double rings -->
  <circle cx="160" cy="160" r="110" fill="none" stroke="url(#gold)" stroke-width="1.6"/>
  <circle cx="160" cy="160" r="105" fill="none" stroke="url(#gold)" stroke-width="0.6" opacity="0.55"/>

  <!-- rotating arabesque leaflet ring -->
  <g class="ring">
    <g>
      <!-- 8 leaflets arranged at evenly spaced angles -->
      <g transform="translate(160 50)"><use href="#leaflet" /></g>
      <g transform="rotate(45  160 160) translate(160 50)"><use href="#leaflet" /></g>
      <g transform="rotate(90  160 160) translate(160 50)"><use href="#leaflet" /></g>
      <g transform="rotate(135 160 160) translate(160 50)"><use href="#leaflet" /></g>
      <g transform="rotate(180 160 160) translate(160 50)"><use href="#leaflet" /></g>
      <g transform="rotate(225 160 160) translate(160 50)"><use href="#leaflet" /></g>
      <g transform="rotate(270 160 160) translate(160 50)"><use href="#leaflet" /></g>
      <g transform="rotate(315 160 160) translate(160 50)"><use href="#leaflet" /></g>
    </g>
  </g>

  <!-- subtle 8-point star halo behind monogram -->
  <g class="star" opacity="0.5">
    <path d="M160 90 L168 152 L230 160 L168 168 L160 230 L152 168 L90 160 L152 152 Z"
          fill="url(#gold)" filter="url(#softShadow)" opacity="0.25"/>
  </g>

  <!-- small pulsing dot above the M (like a star) -->
  <circle class="pulse-dot" cx="160" cy="100" r="2.4" fill="#fff2c8"/>

  <!-- elegant serif "M" monogram, drawn as paths for crisp rendering -->
  <g class="shimmer-fill">
    <path fill="url(#goldShimmer)" d="
      M104 220
      L104 130
      L98 130 L98 124
      L130 124
      L160 184
      L190 124
      L222 124 L222 130 L216 130
      L216 220 L222 220 L222 226 L186 226 L186 220 L194 220
      L194 142
      L160 210
      L156 210
      L122 142
      L122 220
      L130 220
      L130 226 L96 226 L96 220 Z"/>
    <!-- subtle "S" prefix integrated under the M as flourish -->
    <path d="M138 236 q22 -10 44 0" fill="none" stroke="url(#goldShimmer)" stroke-width="1.6" stroke-linecap="round"/>
    <circle cx="138" cy="236" r="1.7" fill="url(#goldShimmer)"/>
    <circle cx="182" cy="236" r="1.7" fill="url(#goldShimmer)"/>
  </g>

  <!-- subtle base shadow under the monogram -->
  <ellipse cx="160" cy="248" rx="46" ry="3" fill="#000" opacity="0.16" filter="url(#softShadow)"/>
</svg>
